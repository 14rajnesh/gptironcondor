name: Weekly Iron Condor Paper Bot

on:
  workflow_dispatch:

  schedule:
    # 09:45 AM IST = 04:15 UTC
    - cron: "15 4 * * 1-5"

    # 12:30 PM IST = 07:00 UTC
    - cron: "00 7 * * 1-5"

    # 02:00 PM IST = 08:30 UTC
    - cron: "30 8 * * 1-5"

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Show files
        run: |
          echo "Repo files:"
          ls -la
          echo ""
          echo "Python files:"
          find . -maxdepth 2 -name "*.py" -type f

      - name: Check for old FYERS code
        run: |
          echo "Checking for old FYERS code..."
          if grep -R "FyersProvider\|FYERS_CLIENT_ID\|FYERS_ACCESS_TOKEN\|fyersModel" -n . \
            --exclude-dir=.git \
            --exclude-dir=.github; then
            echo "❌ Old FYERS code found. Delete or replace the listed files."
            exit 1
          else
            echo "✅ No old FYERS code found."
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create data folder
        run: mkdir -p data

      - name: Run Angel One Iron Condor Paper Bot
        env:
          ANGEL_API_KEY: ${{ secrets.ANGEL_API_KEY }}
          ANGEL_CLIENT_CODE: ${{ secrets.ANGEL_CLIENT_CODE }}
          ANGEL_PIN: ${{ secrets.ANGEL_PIN }}
          ANGEL_TOTP_SECRET: ${{ secrets.ANGEL_TOTP_SECRET }}

          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

          PAPER_TRADING_ONLY: "true"
          BOT_MODE: "ONCE"

          INITIAL_CAPITAL: "1000000"
          LOT_SIZE: "75"

          MIN_DTE: "2"
          MAX_DTE: "6"

          MIN_VIX: "10"
          MAX_VIX: "25"

          SHORT_DELTA_TARGET: "0.15"

          FIXED_WING_WIDTH: "200"
          MIN_CREDIT_PER_UNIT: "20"
          MAX_RISK_REWARD: "8"

          MIN_VOLUME: "1000"
          MIN_OI: "10000"
          MAX_SPREAD_PCT: "30"

          PROFIT_TARGET_PCT: "0.50"
          STOP_LOSS_MULTIPLIER: "2.0"
          TIME_EXIT_DTE: "3"

          NORMAL_DELTA_ADJUST: "0.15"
          DEGRADED_DELTA_ADJUST: "0.40"
          MAX_ADJUSTMENTS_PER_DAY: "2"

        run: python weekly_iron_condor_bot.py

      - name: Upload CSV logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: iron-condor-csv-logs
          path: data/
