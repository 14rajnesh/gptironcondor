name: Weekly Iron Condor Paper Bot

on:
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Show files
        run: |
          echo "Repo files:"
          ls -la
          echo ""
          echo "Python files:"
          find . -maxdepth 2 -name "*.py" -type f

      - name: Check for old FYERS code
        run: |
          echo "Checking for old FYERS code..."
          if grep -R "FyersProvider\|FYERS_CLIENT_ID\|FYERS_ACCESS_TOKEN" -n . \
            --exclude-dir=.git \
            --exclude-dir=.github; then
            echo "❌ Old FYERS code found. Delete or replace the listed files."
            exit 1
          else
            echo "✅ No old FYERS code found."
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create data folder
        run: mkdir -p data

      - name: Run Angel One Iron Condor Paper Bot
        env:
          ANGEL_API_KEY: ${{ secrets.ANGEL_API_KEY }}
          ANGEL_CLIENT_CODE: ${{ secrets.ANGEL_CLIENT_CODE }}
          ANGEL_PIN: ${{ secrets.ANGEL_PIN }}
          ANGEL_TOTP_SECRET: ${{ secrets.ANGEL_TOTP_SECRET }}

          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

          INITIAL_CAPITAL: "1000000"
          LOT_SIZE: "75"
          PAPER_TRADING_ONLY: "true"

          MIN_VIX: "10"
          MAX_VIX: "20"

          SHORT_DELTA_TARGET: "0.15"
          LONG_DELTA_TARGET: "0.05"

          PROFIT_TARGET_PCT: "0.50"
          STOP_LOSS_MULTIPLIER: "2.0"

          MIN_VOLUME: "1000"
          MIN_OI: "10000"
          MAX_SPREAD_PCT: "30"

          MAX_ADJUSTMENTS_PER_DAY: "2"

        run: python weekly_iron_condor_bot.py

      - name: Upload CSV logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: iron-condor-csv-logs
          path: data/
